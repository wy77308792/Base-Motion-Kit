<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方块 A & B 缩放交互 - 投影微调版</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --color-a: #ffffff;
            --color-b: #F8F8F9;
            --color-inner: #F0F4FF;
            --stroke-color: #D0D3D6;
            --icon-blue: #3377FF;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 动画主舞台 */
        .stage {
            position: relative;
            width: 89.5px;
            height: 64px;
            
            /* 锚点：整体最下方中心点 (89.5/2, 64) */
            transform-origin: 44.75px 64px;
            
            /* 交互过渡：整体缩小 */
            transition: transform 150ms ease-in-out;
            cursor: pointer;
        }

        /* 悬停触发整体缩小 */
        .stage:hover {
            transform: scale(0.9);
        }

        /* 图标调整：尺寸 36*36px */
        .icon-plus {
            position: absolute;
            z-index: 4;
            width: 36px;
            height: 36px;
            left: 28px; 
            top: 42px;
            pointer-events: none;
            
            /* 锚点：图标中心缩放 */
            transform-origin: center;
            
            /* 独立过渡动画：150ms */
            transition: transform 150ms ease-in-out;
        }

        /* 悬停触发图标放大 1.2 倍 */
        .stage:hover .icon-plus {
            transform: scale(1.2);
        }
        
        .icon-plus svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 方块 A */
        .block-a {
            position: absolute;
            z-index: 2;
            width: 67px;
            height: 64px;
            left: 22.5px;
            top: 0px;
            background-color: var(--color-a);
            border: 0.5px solid var(--stroke-color);
            border-radius: 8px;
            
            /* 投影微调：透明度从 0.03 降至 0.02 (2%) */
            box-shadow: -1px 1px 4px 2.03px rgba(31, 35, 41, 0.02);
            
            transform: rotate(9deg);
            box-sizing: border-box;
            pointer-events: none;
            display: flex;
            padding: 8px;
            gap: 6px;
            align-items: flex-start;
        }

        /* 内部方块 a, b, c */
        .inner-box {
            background-color: var(--color-inner);
            border-radius: 3px;
            flex-shrink: 0;
        }

        .box-a { width: 14px; height: 48px; }

        .right-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .box-bc { width: 32px; height: 21px; }

        /* 方块 B */
        .block-b {
            position: absolute;
            z-index: 1;
            width: 64px;
            height: 57px;
            left: 0px;
            top: 3.5px;
            background-color: var(--color-b);
            border-radius: 8px;
            background-image: url("data:image/svg+xml,%3csvg width='64' height='57' viewBox='0 0 64 57' xmlns='http://www.w3.org/2000/svg'%3e%3crect x='0.25' y='0.25' width='63.5' height='56.5' rx='8' fill='none' stroke='%23D0D3D6' stroke-width='1' stroke-dasharray='4%2c4' pathLength='240' stroke-linecap='butt'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            transform: rotate(-8deg);
            box-sizing: border-box;
            pointer-events: none;
        }

        .tip {
            margin-top: 80px;
            color: #888;
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="stage">
        <!-- SVG 图标：支持悬停 1.2x 放大 -->
        <div class="icon-plus">
            <svg viewBox="0 0 39 39" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.09082 17.2727C9.09082 11.7499 13.568 7.27274 19.0908 7.27274C24.6137 7.27274 29.0908 11.7499 29.0908 17.2727C29.0908 22.7956 24.6137 27.2727 19.0908 27.2727C13.568 27.2727 9.09082 22.7956 9.09082 17.2727Z" fill="#3377FF"/>
                <path d="M18.458 12.7727C18.458 12.423 18.7416 12.1394 19.0913 12.1394C19.4411 12.1394 19.7247 12.423 19.7247 12.7727V16.6394H23.5913C23.9411 16.6394 24.2247 16.923 24.2247 17.2727C24.2247 17.6225 23.9411 17.9061 23.5913 17.9061H19.7247V21.7727C19.7247 22.1225 19.4411 22.4061 19.0913 22.4061C18.7416 22.4061 18.458 22.1225 18.458 21.7727V17.9061H14.5913C14.2416 17.9061 13.958 17.6225 13.958 17.2727C13.958 16.923 14.2416 16.6394 14.5913 16.6394H18.458V12.7727Z" fill="white"/>
            </svg>
        </div>

        <div class="block-b"></div>
        
        <div class="block-a">
            <div class="inner-box box-a"></div>
            <div class="right-group">
                <div class="inner-box box-bc"></div>
                <div class="inner-box box-bc"></div>
            </div>
        </div>
    </div>

    <div class="tip">
        <strong>方块 A 投影已微调</strong><br>
        不透明度降至 2% | 悬停体验：整体 (0.9x) 与图标 (1.2x)<br>
        <span style="font-size: 11px; color: #aaa;">使用 transform 进行高性能 GPU 渲染</span>
    </div>

</body>
</html>
