<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinking Text Shimmer</title>
  <script>
    const initialTheme = new URLSearchParams(window.location.search).get("theme");
    if (initialTheme === "dark" || initialTheme === "light") {
      document.documentElement.setAttribute("data-theme", initialTheme);
    }
  </script>
  <style>
    :root,
    html[data-theme="light"] {
      --page-bg: #ffffff;
      --text-color: #8f959e;
      --shine-opacity: 0.8;
    }

    html[data-theme="dark"] {
      --page-bg: #1a1a1a;
      --text-color: #757575;
      --shine-opacity: 0.4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }

    .thinking-text {
      position: relative;
      display: inline-block;
      color: var(--text-color);
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 22px;
      white-space: nowrap;
    }

    .thinking-text::after {
      position: absolute;
      inset: 0;
      content: attr(data-text);
      color: transparent;
      background:
        linear-gradient(
          90deg,
          transparent 0,
          transparent calc(var(--shine-x) - 28px),
          rgba(255, 255, 255, 0) calc(var(--shine-x) - 20px),
          rgba(255, 255, 255, var(--shine-opacity)) var(--shine-x),
          rgba(255, 255, 255, 0) calc(var(--shine-x) + 20px),
          transparent calc(var(--shine-x) + 28px),
          transparent 100%
        );
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      pointer-events: none;
      animation: text-shimmer 3000ms cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    @property --shine-x {
      syntax: "<length>";
      inherits: false;
      initial-value: -40px;
    }

    @keyframes text-shimmer {
      0% {
        --shine-x: -40px;
      }

      66.667% {
        --shine-x: calc(var(--text-width, 96px) + 40px);
      }

      100% {
        --shine-x: calc(var(--text-width, 96px) + 40px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .thinking-text::after {
        animation: none;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <span class="thinking-text" id="thinkingText" data-text="编写页面代码中...">编写页面代码中...</span>
  <script>
    const thinkingText = document.getElementById("thinkingText");
    const resize = () => {
      thinkingText.style.setProperty("--text-width", `${thinkingText.getBoundingClientRect().width}px`);
    };
    resize();
    if ("ResizeObserver" in window) {
      new ResizeObserver(resize).observe(thinkingText);
    } else {
      window.addEventListener("resize", resize);
    }
  </script>
</body>
</html>
