<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinking Text Shimmer</title>
  <script>
    const initialTheme = new URLSearchParams(window.location.search).get("theme");
    if (initialTheme === "dark" || initialTheme === "light") {
      document.documentElement.setAttribute("data-theme", initialTheme);
    }
  </script>
  <style>
    :root,
    html[data-theme="light"] {
      --page-bg: #ffffff;
      --text-color: #646a73;
      --shine-color: rgba(255, 255, 255, 0.98);
    }

    html[data-theme="dark"] {
      --page-bg: #1a1a1a;
      --text-color: #a6a6a6;
      --shine-color: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
      font-family: "SF Pro Text", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }

    .thinking-text {
      position: relative;
      display: inline-block;
      color: var(--text-color);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 22px;
      white-space: nowrap;
    }

    .thinking-text::after {
      position: absolute;
      inset: 0;
      content: attr(data-text);
      color: transparent;
      background: linear-gradient(
        100deg,
        transparent 0%,
        transparent 34%,
        var(--shine-color) 48%,
        transparent 62%,
        transparent 100%
      );
      background-repeat: no-repeat;
      background-size: 52% 100%;
      background-position: -80% 0;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      pointer-events: none;
      animation: text-shimmer 1s ease-in-out infinite;
    }

    @keyframes text-shimmer {
      0% {
        background-position: -80% 0;
      }

      100% {
        background-position: 180% 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .thinking-text::after {
        animation: none;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <span class="thinking-text" data-text="AI 正在思考中...">AI 正在思考中...</span>
</body>
</html>
