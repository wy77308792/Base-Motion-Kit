<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双方块无缝动画 (Square A & B)</title>
    <style>
        /* * 全局重置与环境设置 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #F8F8F9;
            font-family: sans-serif;
            overflow: hidden;
            /* 新增：背景色过渡动画 */
            transition: background-color 200ms ease-in-out;
        }

        /* 新增：当 stage 被悬停时，改变 body 背景色 */
        body:has(.stage:hover) {
            background-color: #EDEDEE;
        }

        /* * 舞台容器 */
        .stage {
            position: relative;
            width: 100px;
            height: 120px;
            cursor: pointer;
        }

        /* * 通用方块容器 */
        .block {
            position: absolute;
            width: 80px;
            transform-origin: center center;
            will-change: transform;
            /* Flex 布局确保 SVG 居中 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* * SVG 样式重置 */
        .block svg {
            display: block;
            width: 100%;
            height: 100%;
            overflow: visible; /* 防止描边被切断 */
        }

        /* * 方块 A (上层) */
        .block-a {
            height: 94px;
            z-index: 2;
            left: 0px;
            top: 0px;
            transition: transform 200ms ease-in-out, filter 200ms ease-in-out;
            filter: drop-shadow(-2px 2px 6px rgba(31, 35, 41, 0));
        }

        /* * 方块 B (下层) */
        .block-b {
            height: 84px;
            z-index: 1;
            left: 0px;
            top: 10px;
            transition: transform 200ms ease-in-out;
        }

        /* * 折角三角形样式 */
        .triangle-fold {
            fill: #ffffff;
            stroke: #E5E6E9;
            stroke-width: 1;
            stroke-linejoin: round;
            stroke-linecap: round;
            filter: drop-shadow(-2px 2px 6px rgba(31, 35, 41, 0.03));
        }

        /* * Excel 图标样式 (独立层级) */
        .icon-excel {
            position: absolute;
            width: 36px;
            height: 36px;
            
            /* 位置调整：-18px -> -20px (整体左移2px) */
            left: -20px;
            
            /* 位置调整：50px -> 46px (整体上移4px) */
            top: 46px;
            
            transform: rotate(-30deg);
            z-index: 10;
            filter: drop-shadow(0px 4px 16px rgba(53, 189, 75, 0.3));
            transition: transform 200ms ease-in-out;
            pointer-events: none;
        }

        /* * Bitable 图标样式 */
        .icon-bitable {
            position: absolute;
            width: 31px;
            height: 31px;
            left: 42px;
            top: 49px;
            transform: rotate(15deg);
            z-index: 10;
            transition: transform 200ms ease-in-out;
            pointer-events: none;
        }

        /* * Sheet 图标样式 (新增) */
        .icon-sheet {
            position: absolute;
            width: 26px;
            height: 26px;
            
            /* 位置调整：x=72 (保持不变), y=20 -> 16 (向上移4px) */
            left: 72px;
            top: 16px;
            
            /* 旋转：顺时针 20度 */
            transform: rotate(20deg);
            z-index: 10;

            /* 新增：不透明度 30% */
            opacity: 0.3;
            
            /* 动画过渡 */
            transition: transform 200ms ease-in-out;
            pointer-events: none;
        }

        /* * 交互触发定义 (第二帧 Hover 状态) */
        
        /* 1. 方块 A 旋转并移动 */
        .stage:hover .block-a {
            transform: translate(12px, 0) rotate(15deg);
            filter: drop-shadow(-2px 2px 6px rgba(31, 35, 41, 0.03));
        }

        /* 2. 方块 B 旋转并移动 */
        .stage:hover .block-b {
            transform: translate(-12px, 0) rotate(-10deg);
        }

        /* 3. Excel 图标动画 */
        .stage:hover .icon-excel {
            transform: translate(-16px, -7px) rotate(-45deg);
        }
        
        /* 4. Bitable 图标动画 */
        .stage:hover .icon-bitable {
            /* 目标位置: x=68 (保持不变), y=40
               初始位置: x=42, y=49
               位移计算:
               X: 68 - 42 = 26px
               Y: 40 - 49 = -9px
               旋转: 保持顺时针旋转到 45度
            */
            transform: translate(26px, -9px) rotate(45deg);
        }

        /* 5. Sheet 图标动画 (调整) */
        .stage:hover .icon-sheet {
            /* 向右上方飞出，并加大旋转角度 */
            /* 原 x=15, 现 x=25 (增加10px) */
            transform: translate(25px, -5px) rotate(40deg);
        }

        /* * 交互提示 */
        .hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
