<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Vision - Ambient Ripple</title>
    <style>
        :root {
            --c1: #0092cc;
            --c2: #006aff;
            --c3: #ae00ff;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #050812;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            position: relative;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #050812;
            overflow: hidden;
            isolation: isolate;
            z-index: 0;
        }

        .vision-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            background-color: #050812;
            overflow: hidden;
            isolation: isolate;
            z-index: 1;
            --ambient-width: 1132px;
            --ambient-height: 1053px;
            --ambient-max: 1132px;
        }

        #masked-layer {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            -webkit-mask: url(#vision-mask);
            mask: url(#vision-mask);
            opacity: 0;
            animation: layer-fade-in 0.8s ease-out forwards;
        }

        .blobs-container {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 1;
            transform: scale(1.2); 
        }

        .color-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px); 
            will-change: transform, opacity;
        }

        @keyframes flow-cycle-A {
            0% { background-color: var(--c1); transform: translate(0, 0) scale(1); opacity: 1; }
            33% { background-color: var(--c2); transform: translate(150px, -110px) scale(1.8); opacity: 0.3; } 
            66% { background-color: var(--c3); transform: translate(-110px, 110px) scale(0.6); opacity: 0.9; } 
            100% { background-color: var(--c1); transform: translate(0, 0) scale(1); opacity: 1; }
        }
        @keyframes flow-cycle-B {
            0% { background-color: var(--c3); transform: translate(0, 0) scale(0.8); opacity: 0.4; }
            50% { background-color: var(--c1); transform: translate(-130px, -90px) scale(1.6); opacity: 1; } 
            100% { background-color: var(--c3); transform: translate(0, 0) scale(0.8); opacity: 0.4; }
        }
        @keyframes flow-cycle-C {
            0% { background-color: var(--c2); transform: translate(0, 0) scale(0.6); opacity: 0.4; }
            25% { background-color: var(--c3); transform: translate(75px, 35px) scale(0.8); opacity: 0.8; } 
            50% { background-color: var(--c1); transform: translate(35px, 110px) scale(1); opacity: 1; } 
            75% { background-color: var(--c2); transform: translate(-75px, -60px) scale(0.8); opacity: 0.8; } 
            100% { background-color: var(--c2); transform: translate(0, 0) scale(0.6); opacity: 0.4; }
        }

        .blob-1 { width: calc(var(--ambient-max) * 0.62); height: calc(var(--ambient-max) * 0.62); top: calc(var(--ambient-height) * -0.19); left: calc(var(--ambient-width) * -0.18); animation: flow-cycle-A 3.5s infinite ease-in-out; } 
        .blob-2 { width: calc(var(--ambient-max) * 0.71); height: calc(var(--ambient-max) * 0.71); top: calc(var(--ambient-height) * -0.19); right: calc(var(--ambient-width) * -0.18); animation: flow-cycle-B 4.5s infinite ease-in-out; animation-delay: -2.5s; } 
        .blob-3 { width: calc(var(--ambient-max) * 0.62); height: calc(var(--ambient-max) * 0.62); bottom: calc(var(--ambient-height) * -0.19); left: calc(var(--ambient-width) * -0.13); animation: flow-cycle-C 3s infinite ease-in-out; animation-delay: -1s; } 
        .blob-4 { width: calc(var(--ambient-max) * 0.66); height: calc(var(--ambient-max) * 0.66); bottom: calc(var(--ambient-height) * -0.19); right: calc(var(--ambient-width) * -0.18); animation: flow-cycle-A 4s infinite reverse ease-in-out; animation-delay: -5s; } 

        #matrix-canvas {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes layer-fade-in { from { opacity: 0; } to { opacity: 1; } }

        @media (prefers-reduced-motion: reduce) {
            #masked-layer {
                opacity: 0.8;
                animation: none;
            }

            .color-blob {
                animation: none;
            }

            .blob-1 { background-color: var(--c1); opacity: 0.8; }
            .blob-2 { background-color: var(--c2); opacity: 0.5; }
            .blob-3 { background-color: var(--c3); opacity: 0.5; }
            .blob-4 { background-color: var(--c1); opacity: 0.35; }
        }
    </style>
</head>
<body>
    <div class="stage">
        <div class="vision-container" id="container">
            <svg width="0" height="0" style="position: absolute; pointer-events: none;">
                <defs>
                    <filter id="blur-edge" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur id="fe-blur-edge" stdDeviation="20" />
                    </filter>
                    <filter id="blur-ripple" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur id="fe-blur-ripple" stdDeviation="35" /> 
                    </filter>
                    
                    <mask id="vision-mask" maskUnits="userSpaceOnUse" x="0" y="0">
                        <rect width="100%" height="100%" fill="black" />
                        <rect id="mask-edge" x="0" y="0" fill="none" stroke="white" stroke-width="30" filter="url(#blur-edge)" opacity="0.6" />
                        <path id="mask-ripple" d="" fill="white" filter="url(#blur-ripple)" opacity="0" />
                    </mask>
                </defs>
            </svg>

            <div id="masked-layer">
                <div class="blobs-container">
                    <div class="color-blob blob-1"></div>
                    <div class="color-blob blob-2"></div>
                    <div class="color-blob blob-3"></div>
                    <div class="color-blob blob-4"></div>
                </div>
                <canvas id="matrix-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // 【1】白点 Canvas 矩阵代码 (完全保留不变)
        // =========================================================
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const CONFIG = { spacing: 10, baseSize: 2, baseRadius: 0.6, dotColor: '255, 255, 255', baseAlpha: 0.7, activeSize: 3, activeRadius: 1, activeAlpha: 1.0, glowBlur: 6, activeRate: 0.10, invisibleRate: 0.25, changeSpeed: 0.2, fadeStep: 0.3 };
        let baseSprite, activeSprite, activeSpriteOffset, width, height, cols, rows, updatesPerFrame, targetState, currentState;

        function createSprites() {
            const baseCvs = document.createElement('canvas'); baseCvs.width = CONFIG.baseSize; baseCvs.height = CONFIG.baseSize;
            const bCtx = baseCvs.getContext('2d'); bCtx.fillStyle = `rgba(${CONFIG.dotColor}, ${CONFIG.baseAlpha})`;
            drawRoundedRect(bCtx, 0, 0, CONFIG.baseSize, CONFIG.baseSize, CONFIG.baseRadius); bCtx.fill(); baseSprite = baseCvs;
            const padding = CONFIG.glowBlur * 2; const size = CONFIG.activeSize + padding * 2;
            const activeCvs = document.createElement('canvas'); activeCvs.width = size; activeCvs.height = size;
            const aCtx = activeCvs.getContext('2d'); aCtx.translate(padding, padding); aCtx.fillStyle = `rgba(${CONFIG.dotColor}, ${CONFIG.activeAlpha})`; aCtx.shadowColor = "white"; aCtx.shadowBlur = CONFIG.glowBlur;
            drawRoundedRect(aCtx, 0, 0, CONFIG.activeSize, CONFIG.activeSize, CONFIG.activeRadius); aCtx.fill(); activeSprite = activeCvs;
            activeSpriteOffset = padding + (CONFIG.activeSize - CONFIG.baseSize) / 2;
        }

        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = Math.max(1, window.devicePixelRatio || 1);
            width = Math.max(1, Math.round(rect.width));
            height = Math.max(1, Math.round(rect.height));
            container.style.setProperty('--ambient-width', `${width}px`);
            container.style.setProperty('--ambient-height', `${height}px`);
            container.style.setProperty('--ambient-max', `${Math.max(width, height)}px`);
            const visionMask = document.getElementById('vision-mask'); const maskEdge = document.getElementById('mask-edge');
            if(visionMask) { visionMask.setAttribute('width', width); visionMask.setAttribute('height', height); }
            if(maskEdge) { maskEdge.setAttribute('width', width); maskEdge.setAttribute('height', height); }
            canvas.width = Math.round(width * dpr); canvas.height = Math.round(height * dpr);
            canvas.style.width = `${width}px`; canvas.style.height = `${height}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            cols = Math.ceil(width / CONFIG.spacing); rows = Math.ceil(height / CONFIG.spacing);
            const total = cols * rows; targetState = new Int8Array(total); currentState = new Float32Array(total); updatesPerFrame = Math.max(1, Math.floor(total * CONFIG.changeSpeed));
            for (let i = 0; i < total; i++) {
                const rand = Math.random(); let state = (rand < CONFIG.activeRate) ? 1 : (rand < CONFIG.activeRate + CONFIG.invisibleRate ? -1 : 0);
                targetState[i] = state; currentState[i] = state; 
            }
            createSprites();
        }
        if ('ResizeObserver' in window) {
            new ResizeObserver(resize).observe(container);
        } else {
            window.addEventListener('resize', resize);
        }
        resize();

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, width, height, radius); return; }
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
        }

        function lerp(start, end, t) { return start * (1 - t) + end * t; }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const totalPixels = cols * rows;
            for(let k = 0; k < updatesPerFrame; k++) {
                const idx = Math.floor(Math.random() * totalPixels);
                const rand = Math.random();
                if (rand < CONFIG.activeRate) targetState[idx] = 1; else if (rand < CONFIG.activeRate + CONFIG.invisibleRate) targetState[idx] = -1; else targetState[idx] = 0; 
            }
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const idx = j * cols + i; const target = targetState[idx]; let current = currentState[idx];
                    if (current !== target) {
                        if (Math.abs(current - target) < CONFIG.fadeStep) current = target; else if (current < target) current += CONFIG.fadeStep; else current -= CONFIG.fadeStep;
                        currentState[idx] = current;
                    }
                    if (current <= -0.99) continue;
                    const x = i * CONFIG.spacing; const y = j * CONFIG.spacing;
                    if (Math.abs(current) < 0.01) { ctx.drawImage(baseSprite, x, y); continue; }
                    if (current >= 0.99) { ctx.drawImage(activeSprite, x - activeSpriteOffset + (CONFIG.activeSize - CONFIG.baseSize)/2, y - activeSpriteOffset + (CONFIG.activeSize - CONFIG.baseSize)/2); continue; }
                    let size = (current < 0) ? CONFIG.baseSize : lerp(CONFIG.baseSize, CONFIG.activeSize, current);
                    let r = (current < 0) ? CONFIG.baseRadius : lerp(CONFIG.baseRadius, CONFIG.activeRadius, current);
                    let alpha = (current < 0) ? lerp(0, CONFIG.baseAlpha, current + 1) : lerp(CONFIG.baseAlpha, CONFIG.activeAlpha, current);
                    const offset = (size - CONFIG.baseSize) / 2; ctx.fillStyle = `rgba(${CONFIG.dotColor}, ${alpha})`;
                    if (current > 0.5) { ctx.shadowColor = "white"; ctx.shadowBlur = lerp(0, CONFIG.glowBlur, current); } else { ctx.shadowBlur = 0; }
                    drawRoundedRect(ctx, x - offset, y - offset, size, size, r); ctx.fill(); ctx.shadowBlur = 0; 
                }
            }
            requestAnimationFrame(animate);
        }
        if (!reduceMotion) requestAnimationFrame(animate);

        // =========================================================
        // 【2】中枢控制逻辑
        // =========================================================
        const maskEdge = document.getElementById('mask-edge');
        const feBlurEdge = document.getElementById('fe-blur-edge');
        const maskRipple = document.getElementById('mask-ripple');

        let rippleT = 0; 
        let animTime = 0;
        
        // 涟漪逻辑变量
        let loopStartTime = performance.now(); 
        let isWaiting = false;
        let waitStartTime = 0;

        // 涟漪路径生成 (维持不变)
        function getOrganicPath(cx, cy, baseRx, baseRy, time, percentage) {
            let outerPoints = [], innerPoints = []; const segments = 80; 
            let dynAmp = Math.min(1, Math.max(0, percentage / 0.6));
            
            const strokeWidth = 30 + (percentage * 108.33); 

            for (let i = 0; i <= segments; i++) {
                let angle = (i / segments) * Math.PI * 2;
                let wobbleCenter = (Math.sin(time * 2.5) * 6 + Math.cos(time * 1.8) * 4) * dynAmp;
                let wobbleRad = (Math.sin(angle * 4 + time * 3) * 16 + Math.cos(angle * 3 - time * 2) * 12) * dynAmp;
                let thickFactor = 1.0 + (Math.sin(angle * 5 + time * 2) * 0.2 + Math.cos(angle * 3 - time * 1.5) * 0.1) * dynAmp;
                const halfThick = (strokeWidth / 2) * thickFactor;
                let xO = cx + wobbleCenter + (baseRx + wobbleRad + halfThick) * Math.cos(angle);
                let yO = cy + wobbleCenter + (baseRy + wobbleRad + halfThick) * Math.sin(angle);
                outerPoints.push(`${i === 0 ? 'M' : 'L'} ${xO.toFixed(1)} ${yO.toFixed(1)}`);
                let xI = cx + wobbleCenter + Math.max(1, baseRx + wobbleRad - halfThick) * Math.cos(angle);
                let yI = cy + wobbleCenter + Math.max(1, baseRy + wobbleRad - halfThick) * Math.sin(angle);
                innerPoints.push(`${xI.toFixed(1)} ${yI.toFixed(1)}`);
            }
            return outerPoints.join(' ') + ' L ' + innerPoints.reverse().join(' L ') + ' Z';
        }

        function renderFluidMasks() {
            animTime += 0.02;
            let currentTime = performance.now();
            let elapsedInLoop = currentTime - loopStartTime;
            
            // --- 涟漪扩散逻辑 (保持不变) ---
            if (!isWaiting) {
                rippleT += 0.0312; 
                if (rippleT > 1.2) { 
                    rippleT = 1.2; 
                    isWaiting = true;
                    waitStartTime = currentTime; 
                }
            } else {
                if (currentTime - waitStartTime >= 3000) {
                    isWaiting = false;
                    rippleT = 0;
                    loopStartTime = currentTime; 
                    elapsedInLoop = 0;
                }
            }

            const rippleRadius = (Math.max(width, height) / 2) * rippleT; 
            const rx = rippleRadius; 
            const ry = rippleRadius; // 使用容器长边以适配横屏、竖屏和拖拽缩放
            maskRipple.setAttribute('d', getOrganicPath(width/2, height/2, rx, ry, animTime, rippleT));

            // ==========================================
            // 【此处修改】调整涟漪透明度
            // 原 peakAlpha 为 0.8，改为 60% 后为 0.48
            // ==========================================
            let ra = 0;
            const peakAlpha = 0.48; 
            
            if (!isWaiting) {
                if (elapsedInLoop < 500) {
                    ra = (elapsedInLoop / 500) * peakAlpha; 
                } else if (rippleT < 0.75) {
                    ra = peakAlpha; 
                } else {
                    ra = Math.max(0, peakAlpha * (1 - (rippleT - 0.75) / 0.4));
                }
            } else {
                ra = 0; 
            }
            maskRipple.setAttribute('opacity', ra);

            // 边缘呼吸保持不变
            feBlurEdge.setAttribute('stdDeviation', 25 + Math.sin(animTime * 1.5) * 10);
            maskEdge.setAttribute('opacity', 0.5 + Math.cos(animTime * 2) * 0.2);

            requestAnimationFrame(renderFluidMasks);
        }
        if (!reduceMotion) {
            requestAnimationFrame(renderFluidMasks);
        } else {
            maskRipple.setAttribute('opacity', '0.35');
            maskRipple.setAttribute('d', getOrganicPath(width / 2, height / 2, Math.max(width, height) * 0.45, Math.max(width, height) * 0.45, 0, 0.8));
        }
    </script>
</body>
</html>
